<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faktura - aplikacija za štampanje</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5; color: #1a1a2e; line-height: 1.5;
}
.container { display: grid; grid-template-columns: 420px 1fr; gap: 24px; max-width: 1400px; margin: 0 auto; padding: 20px; height: 100vh; }

/* Sidebar */
.sidebar {
  background: #fff; border-radius: 12px; padding: 20px; overflow-y: auto; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  height: calc(100vh - 40px);
}
.sidebar h1 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.sidebar h1 small { font-size: 12px; color: #666; font-weight: normal; }
.form-section { margin-bottom: 16px; }
.form-section h3 { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-group { margin-bottom: 8px; }
.form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 2px; font-weight: 500; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: inherit; background: #fafafa; transition: border .2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #2563eb; background: #fff; }
.form-group textarea { resize: vertical; min-height: 40px; }

/* Items table */
.items-section { margin: 16px 0; }
.items-section .item-row { display: grid; grid-template-columns: 1fr 70px 80px 80px 60px; gap: 4px; align-items: center; margin-bottom: 4px; }
.items-section .item-row.header { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 600; }
.items-section .item-row input { padding: 5px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
.items-section .item-row .btn-remove { background: #fee2e2; color: #dc2626; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.items-section .item-row .btn-remove:hover { background: #fecaca; }
.btn-add-item { background: #eef2ff; color: #4f46e5; border: 1px dashed #c7d2fe; border-radius: 6px; padding: 6px; font-size: 12px; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-add-item:hover { background: #e0e7ff; }
.totals { text-align: right; margin-top: 8px; font-size: 13px; }
.totals div { margin-bottom: 2px; }
.totals .grand-total { font-size: 16px; font-weight: 700; color: #dc2626; }

/* Actions */
.actions { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
.actions button {
  flex: 1; min-width: 80px; padding: 8px 12px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 4px;
}
.btn-pdf { background: #dc2626; color: #fff; }
.btn-pdf:hover { background: #b91c1c; }
.btn-docx { background: #2563eb; color: #fff; }
.btn-docx:hover { background: #1d4ed8; }
.btn-odt { background: #16a34a; color: #fff; }
.btn-odt:hover { background: #15803d; }

.btn-reset { background: #f3f4f6; color: #374151; }
.btn-reset:hover { background: #e5e7eb; }

/* Preview */
.preview {
  background: #e5e7eb; border-radius: 12px; overflow-y: auto; display: flex; align-items: flex-start; justify-content: center;
  padding: 40px; height: calc(100vh - 40px);
}
#invoice-preview {
  background: #fff; width: 210mm; padding: 25mm 20mm; box-shadow: 0 4px 20px rgba(0,0,0,.12); border-radius: 4px;
  font-family: 'Times New Roman', Times, serif; font-size: 11pt; color: #000; line-height: 1.4;
  overflow: hidden; word-break: break-word; overflow-wrap: break-word;
}

/* Invoice template styles */
.invoice-header { display: flex; justify-content: space-between; margin-bottom: 30px; }
.invoice-header .seller-info { font-size: 10pt; }
.invoice-header .seller-info .company-name { font-size: 14pt; font-weight: 700; }
.invoice-header .invoice-title { text-align: right; }
.invoice-header .invoice-title h2 { font-size: 22pt; font-weight: 700; color: #1a1a2e; letter-spacing: 1px; }
.invoice-header .invoice-title .inv-number { font-size: 14pt; font-weight: 600; color: #dc2626; margin-top: 4px; }

.invoice-parties { display: flex; justify-content: space-between; margin-bottom: 24px; padding: 16px 0; border-top: 2px solid #000; border-bottom: 2px solid #000; }
.invoice-parties .party h4 { font-size: 9pt; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.invoice-parties .party .name { font-weight: 700; font-size: 11pt; }

.invoice-meta { display: flex; gap: 24px; margin-bottom: 20px; font-size: 10pt; }
.invoice-meta span strong { display: inline-block; min-width: 80px; }

.invoice-items { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; }
.invoice-items th { background: #1a1a2e; color: #fff; padding: 5px 6px; text-align: left; font-size: 9pt; text-transform: uppercase; letter-spacing: .5px; }
.invoice-items th:nth-child(2), .invoice-items th:nth-child(3), .invoice-items th:nth-child(4), .invoice-items th:nth-child(5) { text-align: right; }
.invoice-items td { padding: 4px 6px; border-bottom: 1px solid #ddd; font-size: 10pt; word-break: break-word; }
.invoice-items td:nth-child(2), .invoice-items td:nth-child(3), .invoice-items td:nth-child(4), .invoice-items td:nth-child(5) { text-align: right; }
.invoice-items tbody tr:nth-child(even) { background: #f9fafb; }

.invoice-totals { margin-left: auto; width: 50%; }
.invoice-totals table { width: 100%; border-collapse: collapse; }
.invoice-totals td { padding: 3px 6px; font-size: 10pt; }
.invoice-totals td:last-child { text-align: right; width: 40%; }
.invoice-totals .total-row td { font-size: 13pt; font-weight: 700; border-top: 2px solid #000; padding-top: 6px; }

.invoice-footer { margin-top: 24px; font-size: 9pt; color: #555; border-top: 1px solid #ddd; padding-top: 10px; }
.invoice-footer .payment-info { margin-bottom: 6px; }

/* Print */
@media print {
  body { background: #fff; }
  .container > .sidebar { display: none !important; }
  .container { display: block; padding: 0; height: auto; }
  .preview { padding: 0; height: auto; background: #fff; }
  #invoice-preview { box-shadow: none; border-radius: 0; }
  @page { margin: 0; size: A4; }
}
/* Mobile */
@media (max-width: 900px) {
  .container { grid-template-columns: 1fr; padding: 10px; height: auto; }
  .sidebar { height: auto; max-height: none; border-radius: 8px; }
  .preview { height: auto; padding: 16px; overflow: visible; }
  #invoice-preview { width: 100%; padding: 15mm 10mm; }
  .sidebar h1 small { display: block; }
}
@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .items-section .item-row.header { display: none; }
  .items-section .item-row {
    grid-template-columns: 1fr 80px 80px; gap: 4px; padding: 6px;
    border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 6px; background: #fafafa;
    position: relative; padding-right: 28px;
  }
  .items-section .item-row .item-desc { grid-column: 1 / -1; }
  .items-section .item-row .item-qty { order: 1; }
  .items-section .item-row .item-price { order: 2; }
  .items-section .item-row .item-total { order: 3; text-align: right; font-size: 11px; align-self: center; }
  .items-section .item-row .btn-remove { position: absolute; top: 4px; right: 2px; width: 22px; height: 22px; font-size: 12px; }
  .invoice-header { flex-direction: column; }
  .invoice-title { text-align: left; margin-top: 8px; }
  .invoice-parties { flex-direction: column; gap: 12px; }
  .invoice-meta { flex-direction: column; gap: 4px; }
  .invoice-totals { width: 100%; }
  .actions button { font-size: 10px; min-width: 60px; padding: 6px 8px; }
}
/* Utility */
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h1>📄 Faktura <small>aplikacija za štampanje</small></h1>

    <div class="form-section">
      <h3>Prodavac</h3>
      <div class="form-group">
        <label>Naziv firme</label>
        <input type="text" id="seller-name" value="Filip Volf PR Deus Inžinjering">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Adresa</label>
          <input type="text" id="seller-address" value="Bulevar Oslobođenja 123">
        </div>
        <div class="form-group">
          <label>Grad / Poštanski broj</label>
          <input type="text" id="seller-city" value="Beograd 11000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>PIB</label>
          <input type="text" id="seller-pib" value="123456789">
        </div>
        <div class="form-group">
          <label>Matični broj</label>
          <input type="text" id="seller-mb" value="98765432">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tekući račun</label>
          <input type="text" id="seller-account" value="160-1234567-89">
        </div>
        <div class="form-group">
          <label>Telefon / Email</label>
          <input type="text" id="seller-contact" value="+381 60 123 456">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Kupac</h3>
      <div class="form-group">
        <label>Naziv / Ime i prezime</label>
        <input type="text" id="buyer-name" value="">
      </div>
      <div class="form-group">
        <label>Adresa</label>
        <input type="text" id="buyer-address" value="">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Grad</label>
          <input type="text" id="buyer-city" value="">
        </div>
        <div class="form-group">
          <label>PIB</label>
          <input type="text" id="buyer-pib" value="">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Podaci o fakturi</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Broj fakture</label>
          <input type="text" id="inv-number" value="1-2026">
        </div>
        <div class="form-group">
          <label>Datum fakture</label>
          <input type="date" id="inv-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Datum dospeća</label>
          <input type="date" id="inv-due">
        </div>
        <div class="form-group">
          <label>Valuta</label>
          <select id="inv-currency" onchange="updatePreview()">
            <option value="RSD">RSD</option>
            <option value="EUR" selected>EUR</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Način plaćanja</label>
          <select id="inv-payment">
            <option value="Tekući račun">Tekući račun</option>
            <option value="Gotovina">Gotovina</option>
            <option value="Kartica">Kartica</option>
            <option value="Ček">Ček</option>
          </select>
        </div>
        <div class="form-group">
          <label>Poreska stopa</label>
          <select id="inv-tax-rate">
            <option value="0">0% (oslobođen)</option>
            <option value="10">10%</option>
            <option value="20" selected>20% (opšta)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Items -->
    <div class="form-section items-section" id="items-section">
      <h3>Stavke</h3>
      <div class="item-row header">
        <span>Opis</span>
        <span>Količ.</span>
        <span>Cena</span>
        <span>Ukupno</span>
        <span></span>
      </div>
      <div id="items-container"></div>
      <button class="btn-add-item" onclick="addItem()">+ Dodaj stavku</button>
      <div class="totals">
        <div>Osnovica: <strong id="preview-base">0,00</strong></div>
        <div>PDV: <strong id="preview-tax">0,00</strong></div>
        <div class="grand-total">Ukupno: <strong id="preview-total">0,00</strong></div>
      </div>
    </div>

    <div class="form-section">
      <h3>Napomena</h3>
      <div class="form-group">
        <textarea id="inv-notes" rows="2">Plaćanje po prijemu fakture. Rok plaćanja: 7 dana.</textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn-pdf" onclick="exportPDF()">📕 PDF</button>
      <button class="btn-docx" onclick="exportDOCX()">📘 DOCX</button>
      <button class="btn-odt" onclick="exportODT()">📗 ODT</button>

      <button class="btn-reset" onclick="resetForm()">⟳ Reset</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview">
    <div id="invoice-preview"></div>
  </div>
</div>

<script>
let itemIdCounter = 0;

function setDefaults() {
  const today = new Date();
  document.getElementById('inv-date').value = today.toISOString().split('T')[0];
  const due = new Date(today); due.setDate(due.getDate() + 7);
  document.getElementById('inv-due').value = due.toISOString().split('T')[0];
}

function addItem(desc, qty, price) {
  const container = document.getElementById('items-container');
  const id = ++itemIdCounter;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.dataset.id = id;
  div.innerHTML = `
    <input type="text" class="item-desc" placeholder="Opis stavke..." value="${desc || ''}">
    <input type="number" class="item-qty" value="${qty || 1}" min="0" step="0.01" oninput="updatePreview()">
    <input type="number" class="item-price" value="${price || 0}" min="0" step="0.01" oninput="updatePreview()">
    <span class="item-total" style="font-size:12px;text-align:right;padding-right:4px;">0,00</span>
    <button class="btn-remove" onclick="removeItem(this)">✕</button>
  `;
  container.appendChild(div);
  updatePreview();
}

function removeItem(btn) {
  btn.closest('.item-row').remove();
  updatePreview();
}

function formatNum(n) {
  return Number(n).toLocaleString('sr-RS', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function parseVal(v) { return parseFloat(v) || 0; }

function updatePreview() {
  const rows = document.querySelectorAll('#items-container .item-row');
  let base = 0;
  rows.forEach(row => {
    const qty = parseVal(row.querySelector('.item-qty').value);
    const price = parseVal(row.querySelector('.item-price').value);
    const total = qty * price;
    row.querySelector('.item-total').textContent = formatNum(total);
    base += total;
  });
  const taxRate = parseInt(document.getElementById('inv-tax-rate').value) || 0;
  const tax = base * taxRate / 100;
  const grandTotal = base + tax;
  document.getElementById('preview-base').textContent = formatNum(base);
  document.getElementById('preview-tax').textContent = formatNum(tax);
  document.getElementById('preview-total').textContent = formatNum(grandTotal);
  renderInvoice();
}

function renderInvoice() {
  const seller = n => document.getElementById('seller-' + n).value;
  const buyer = n => document.getElementById('buyer-' + n).value;
  const val = n => document.getElementById('inv-' + n).value;
  const currency = val('currency');
  const taxRate = parseInt(document.getElementById('inv-tax-rate').value) || 0;
  const notes = document.getElementById('inv-notes').value;

  let base = 0, itemsHtml = '';
  document.querySelectorAll('#items-container .item-row').forEach(row => {
    const desc = row.querySelector('.item-desc').value;
    const qty = parseVal(row.querySelector('.item-qty').value);
    const price = parseVal(row.querySelector('.item-price').value);
    const total = qty * price;
    base += total;
    if (desc) {
      itemsHtml += `<tr><td>${desc}</td><td>${formatNum(qty)}</td><td>${formatNum(price)}</td><td>${taxRate}%</td><td>${formatNum(total)}</td></tr>`;
    }
  });
  const tax = base * taxRate / 100;
  const grandTotal = base + tax;

  document.getElementById('invoice-preview').innerHTML = `
    <div class="invoice-header">
      <div class="seller-info">
        <div class="company-name">${seller('name')}</div>
        <div>${seller('address')}</div>
        <div>${seller('city')}</div>
        <div>PIB: ${seller('pib')} &nbsp;|&nbsp; MB: ${seller('mb')}</div>
        <div>Žiro račun: ${seller('account')}</div>
        <div>${seller('contact')}</div>
      </div>
      <div class="invoice-title">
        <h2>FAKTURA</h2>
        <div class="inv-number">${val('number')}</div>
      </div>
    </div>

    <div class="invoice-parties">
      <div class="party">
        <h4>Prodavac</h4>
        <div class="name">${seller('name')}</div>
        <div>${seller('address')}</div>
        <div>${seller('city')}</div>
        <div>PIB: ${seller('pib')}</div>
      </div>
      <div class="party">
        <h4>Kupac</h4>
        <div class="name">${buyer('name') || '—'}</div>
        <div>${buyer('address') || ''}</div>
        <div>${buyer('city') || ''}</div>
        <div>${buyer('pib') ? 'PIB: ' + buyer('pib') : ''}</div>
      </div>
    </div>

    <div class="invoice-meta">
      <span><strong>Datum izdavanja:</strong> ${val('date')}</span>
      <span><strong>Datum dospeća:</strong> ${val('due')}</span>
      <span><strong>Način plaćanja:</strong> ${val('payment')}</span>
      <span><strong>Valuta:</strong> ${currency}</span>
    </div>

    <table class="invoice-items">
      <thead><tr>
        <th style="width:45%">Opis</th>
        <th style="width:10%">Količina</th>
        <th style="width:13%">Cena</th>
        <th style="width:10%">PDV</th>
        <th style="width:12%">Iznos</th>
      </tr></thead>
      <tbody>${itemsHtml || '<tr><td colspan="5" style="text-align:center;color:#999;">— nema stavki —</td></tr>'}</tbody>
    </table>

    <div class="invoice-totals">
      <table>
        <tr><td>Osnovica:</td><td>${formatNum(base)} ${currency}</td></tr>
        <tr><td>PDV (${taxRate}%):</td><td>${formatNum(tax)} ${currency}</td></tr>
        <tr class="total-row"><td>Ukupno za plaćanje:</td><td>${formatNum(grandTotal)} ${currency}</td></tr>
      </table>
    </div>

    <div class="invoice-footer">
      ${notes ? '<div class="payment-info">' + notes.replace(/\n/g, '<br>') + '</div>' : ''}
      <div>Fakturu izradio: ${seller('name')}</div>
    </div>
  `;
}

function buildInlineHTML() {
  const seller = n => document.getElementById('seller-' + n).value;
  const buyer = n => document.getElementById('buyer-' + n).value;
  const val = n => document.getElementById('inv-' + n).value;
  const currency = val('currency');
  const taxRate = parseInt(document.getElementById('inv-tax-rate').value) || 0;
  const notes = document.getElementById('inv-notes').value;

  let base = 0, itemsRows = '';
  document.querySelectorAll('#items-container .item-row').forEach(row => {
    const desc = escHtml(row.querySelector('.item-desc').value);
    const qty = parseVal(row.querySelector('.item-qty').value);
    const price = parseVal(row.querySelector('.item-price').value);
    const total = qty * price;
    base += total;
    if (desc) {
      itemsRows += `<tr>
        <td style="padding:3pt 4pt;border-bottom:0.5pt solid #ccc;font-size:10pt;word-break:break-word">${desc}</td>
        <td style="padding:3pt 4pt;border-bottom:0.5pt solid #ccc;font-size:10pt;text-align:right">${fmt(qty)}</td>
        <td style="padding:3pt 4pt;border-bottom:0.5pt solid #ccc;font-size:10pt;text-align:right">${fmt(price)}</td>
        <td style="padding:3pt 4pt;border-bottom:0.5pt solid #ccc;font-size:10pt;text-align:right">${taxRate}%</td>
        <td style="padding:3pt 4pt;border-bottom:0.5pt solid #ccc;font-size:10pt;text-align:right">${fmt(total)}</td>
      </tr>`;
    }
  });
  const tax = base * taxRate / 100;
  const grandTotal = base + tax;

  function fmt(v) { return Number(v).toLocaleString('sr-RS', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  return `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"><title>Faktura</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
<style>@page{margin:1.5cm 1.5cm 1.5cm 1.5cm;}body{font-family:'Times New Roman',Times,serif;font-size:11pt;color:#000;line-height:1.3;margin:0;padding:0;}table{border-collapse:collapse;}</style>
</head><body>
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:170mm;margin:0 auto">
<tr><td>

<!-- HEADER -->
<table width="100%" cellpadding="0" cellspacing="0"><tr>
<td valign="top" style="font-size:10pt">
  <div style="font-size:14pt;font-weight:700;margin-bottom:2pt">${escHtml(seller('name'))}</div>
  <div>${escHtml(seller('address'))}</div>
  <div>${escHtml(seller('city'))}</div>
  <div>PIB: ${escHtml(seller('pib'))} | MB: ${escHtml(seller('mb'))}</div>
  <div>&Zcaron;iro ra&ccaron;un: ${escHtml(seller('account'))}</div>
  <div>${escHtml(seller('contact'))}</div>
</td>
<td valign="top" align="right" style="text-align:right">
  <div style="font-size:22pt;font-weight:700;color:#1a1a2e;letter-spacing:1pt">FAKTURA</div>

function exportPDF() {
  const el = document.getElementById('invoice-preview');
  const opt = {
    margin: 0, filename: 'faktura.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true, letterRendering: true, width: el.scrollWidth, height: el.scrollHeight },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(el).save();
}

function exportDOCX() {
  const html = buildInlineHTML();
  const blob = new Blob([html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'faktura.doc';
  a.click(); URL.revokeObjectURL(url);
}

function exportODT() {
  const html = buildInlineHTML();
  const blob = new Blob([html], { type: 'application/vnd.oasis.opendocument.text' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'faktura.odt';
  a.click(); URL.revokeObjectURL(url);
}

function resetForm() {
  if (!confirm('Resetovati sva polja?')) return;
  document.querySelectorAll('.sidebar input, .sidebar textarea, .sidebar select').forEach(el => {
    if (el.type === 'date' || el.type === 'number') el.value = '';
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  document.getElementById('items-container').innerHTML = '';
  itemIdCounter = 0;
  setDefaults();
  addItem('', 1, 0);
}

// Init
document.querySelector('.sidebar').addEventListener('input', updatePreview);
document.querySelector('.sidebar').addEventListener('change', updatePreview);
setDefaults();
addItem('', 1, 0);
</script>
